# SmartSolarEMS — production stack (app + TimescaleDB).
# Suitable for unRAID via the Compose Manager plugin, or any docker compose host.
#
# Set POSTGRES_PASSWORD (and optionally TZ) in the environment or a .env file
# next to this compose file; both default sensibly for a LAN-only install.

services:
  app:
    image: smartsolarems:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-smartsolar}@db:5432/smartsolarems
      PORT: "8080"
      TZ: ${TZ:-Australia/Sydney}
      # Optional: pin the session-signing secret so logins survive restarts of
      # a multi-replica setup. Auto-generated at boot if unset.
      # SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartsolar}
      POSTGRES_DB: smartsolarems
    volumes:
      - smartsolarems-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartsolarems"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # The database is not exposed on the host by default (the app reaches it on
    # the internal compose network). To connect with psql/Grafana etc. from the
    # LAN, uncomment:
    # ports:
    #   - "5432:5432"

volumes:
  smartsolarems-db-data:
